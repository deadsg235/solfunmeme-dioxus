name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  nix-build:
    runs-on: ubuntu-latest
    steps:
      - uses: meta-introspector/checkout@main
      - uses: meta-introspector/install-nix-action@master
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Nix develop check
        run: nix develop --command echo 'dev shell ok'
      - name: Build WASM
        run: nix develop --command dx build --release --platform web
      - name: Run tests
        run: nix develop --command cargo test --workspace
